{% extends "base.html" %}

{% block title %}Maestro - Alterar Senha{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">Alterar Senha</h1>

    {% if error %}
    <div class="alert alert-error text-sm mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>{{ error }}</span>
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success text-sm mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>{{ success }}</span>
    </div>
    {% endif %}

    <div class="card bg-base-100 shadow-md">
        <div class="card-body">
            <form method="POST" action="/ui/change-password">
                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Senha Atual</span>
                    </label>
                    <input type="password" name="current_password" class="input input-bordered w-full" required />
                </div>

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Nova Senha</span>
                    </label>
                    <input type="password" name="new_password" class="input input-bordered w-full" required />
                </div>

                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text">Confirmar Nova Senha</span>
                    </label>
                    <input type="password" name="confirm_password" class="input input-bordered w-full" required />
                </div>

                <button type="submit" class="btn btn-primary w-full">Alterar Senha</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
