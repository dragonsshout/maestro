{% extends "base.html" %}
{% block title %}Maestro — Execuções{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Execuções de Release</h1>
    <div class="badge badge-outline gap-2 p-3 shadow-sm bg-base-100/50 backdrop-blur-sm border-base-300">
        <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
        <span class="text-sm font-medium text-base-content/70">Atualiza automaticamente</span>
    </div>
</div>

<!-- Tabela de execuções com polling a cada 5s via HTMX -->
<div id="executions-table"
     hx-get="/ui/partials/executions"
     hx-trigger="load, every 5s"
     hx-swap="innerHTML">
    <div class="flex justify-center py-12">
        <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
</div>

<!-- Container onde o modal de YAML é injetado via HTMX -->
<div id="yaml-modal-container"></div>

<!-- Container onde o modal de execução é injetado via HTMX -->
<div id="execute-modal-container"></div>
{% endblock %}
