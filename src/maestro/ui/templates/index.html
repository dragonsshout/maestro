{% extends "base.html" %}
{% block title %}Maestro — Execuções{% endblock %}

{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4 mb-6 sm:mb-8">
    <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Execuções de Release</h1>
    <div class="badge badge-outline gap-2 p-3 shadow-sm bg-base-100/50 backdrop-blur-sm border-base-300 self-start sm:self-auto" style="-webkit-backdrop-filter: blur(8px)">
        <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
        <span class="text-xs sm:text-sm font-medium text-base-content/70">Atualiza automaticamente</span>
    </div>
</div>

<!-- Container inicial da tabela -->
<div hx-get="/ui/partials/executions" hx-trigger="load" hx-swap="outerHTML">
    <div class="flex justify-center py-12">
        <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
</div>

<!-- Container onde o modal de YAML é injetado via HTMX -->
<div id="yaml-modal-container"></div>

<!-- Container onde o modal de execução é injetado via HTMX -->
<div id="execute-modal-container"></div>
{% endblock %}
