{% extends "base.html" %}
{% block title %}Configurações — Maestro{% endblock %}

{% block content %}
<div class="max-w-2xl">

    <div class="flex items-center gap-3 mb-8">
        <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary flex items-center">
            <svg class="w-8 h-8 mr-2 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            Configurações
        </h1>
    </div>

    {% if saved %}
    <div class="alert alert-success mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span>Configurações salvas com sucesso.</span>
    </div>
    {% endif %}

    <form method="POST" action="/ui/settings">
        <div class="card bg-base-100/50 backdrop-blur-sm border border-base-300/50 shadow-lg shadow-base-300/10 rounded-2xl">
            <div class="card-body gap-5">

                <h2 class="card-title text-base flex items-center">
                    <svg class="w-5 h-5 mr-1 text-base-content/70" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" /></svg>
                    Integrações
                </h2>

                {% for key, meta in known_settings.items() %}
                <div class="form-control">
                    <label class="label pb-1" for="{{ key }}">
                        <span class="label-text font-medium">{{ meta.label }}</span>
                    </label>
                    <input
                        type="text"
                        id="{{ key }}"
                        name="{{ key }}"
                        value="{{ settings.get(key) or '' }}"
                        placeholder="{{ meta.placeholder }}"
                        class="input input-bordered input-sm w-full font-mono"
                    />
                    {% if meta.help %}
                    <label class="label pt-1">
                        <span class="label-text-alt text-base-content/50">{{ meta.help }}</span>
                    </label>
                    {% endif %}
                </div>
                {% endfor %}

            </div>
        </div>

        <div class="mt-6 flex justify-end">
            <button type="submit" class="btn btn-primary btn-sm shadow-sm hover:scale-105 active:scale-95 transition-transform flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                Salvar configurações
            </button>
        </div>
    </form>

</div>
{% endblock %}
