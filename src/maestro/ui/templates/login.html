<!DOCTYPE html>
<html lang="pt-BR" data-theme="night">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Maestro</title>
    <!-- Assets locais — sem dependência de CDN externo -->
    <link href="/static/css/daisyui.min.css" rel="stylesheet" />
    <script src="/static/js/tailwind.js"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
    <div class="card w-full max-w-sm bg-base-100 shadow-xl border border-base-300">
        <div class="card-body">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary mb-2" style="-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">🎼 Maestro</h2>
                <p class="text-sm text-base-content/70">Orquestrador de Releases</p>
            </div>
            
            {% if error %}
            <div class="alert alert-error text-sm py-2 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-4 w-4" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/ui/login" method="post" class="flex flex-col gap-4">
                <div class="form-control">
                    <label class="label"><span class="label-text">Usuário</span></label>
                    <input type="text" name="username" placeholder="Seu usuário" class="input input-bordered w-full" required autofocus />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">Senha</span></label>
                    <input type="password" name="password" placeholder="Sua senha" class="input input-bordered w-full" required />
                </div>
                <button type="submit" class="btn btn-primary w-full mt-2">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
