<!DOCTYPE html>
<html lang="pt-BR" data-theme="night">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maestro - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-base-200 font-sans text-base-content flex items-center justify-center">

    <div class="card w-full max-w-sm bg-base-100 shadow-xl">
        <div class="card-body">
            <div class="text-center mb-4">
                <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">
                    Maestro
                </h1>
                <p class="text-sm text-base-content/60 mt-1">Orquestrador de Releases</p>
            </div>

            {% if error %}
            <div class="alert alert-error text-sm mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/ui/login">
                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Usuario</span>
                    </label>
                    <input
                        type="text"
                        name="username"
                        placeholder="Nome de usuario"
                        class="input input-bordered w-full"
                        required
                        autofocus
                    />
                </div>

                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text">Senha</span>
                    </label>
                    <input
                        type="password"
                        name="password"
                        placeholder="Senha"
                        class="input input-bordered w-full"
                        required
                    />
                </div>

                <button type="submit" class="btn btn-primary w-full">
                    Entrar
                </button>
            </form>
        </div>
    </div>

</body>
</html>
