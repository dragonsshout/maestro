<div id="execution-status-badge" hx-swap-oob="true">
    {% include "partials/status_badge.html" %}
</div>

<div id="approve-area" hx-swap-oob="true">
    {% if waiting_approval %}
    <button
        class="btn btn-info btn-sm gap-2"
        hx-post="/ui/execution/{{ execution.id }}/approve"
        hx-target="#approve-area"
        hx-swap="innerHTML"
        hx-indicator="#approve-spinner"
        hx-confirm="Confirmar aprovação da release '{{ execution.name }}'?"
    >
        <span id="approve-spinner" class="loading loading-spinner loading-xs htmx-indicator"></span>
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg> Aprovar release
    </button>
    {% endif %}
</div>
