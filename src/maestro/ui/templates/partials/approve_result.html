{% if error %}
<div role="alert" class="alert alert-error">
    <span class="flex items-center gap-1 text-error"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg> {{ error }}</span>
</div>
{% else %}
<div role="alert" class="alert alert-success">
    <span class="flex items-center gap-1 text-success"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> Aprovação enviada com sucesso. O processo continuará em breve.</span>
</div>
{% endif %}
