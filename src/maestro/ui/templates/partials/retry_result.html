{% if error %}
<dialog id="retry-result-modal" class="modal modal-open">
    <div class="modal-box">
        <div class="flex items-center gap-2 mb-4">
            <svg class="w-8 h-8 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            <h3 class="font-bold text-lg">Não foi possível reexecutar</h3>
        </div>
        <div class="alert alert-error">
            <p class="text-sm">{{ error }}</p>
        </div>
        <div class="modal-action">
            <button onclick="document.getElementById('retry-result-modal').remove()" class="btn btn-sm">Fechar</button>
        </div>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('retry-result-modal').remove()"></div>
</dialog>
{% else %}
<dialog id="retry-result-modal" class="modal modal-open">
    <div class="modal-box">
        <div class="flex items-center gap-2 mb-4">
            <svg class="w-8 h-8 text-info" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            <h3 class="font-bold text-lg">Step reenviado</h3>
        </div>
        <div class="alert alert-success">
            <p class="text-sm">O step <span class="font-mono font-bold">{{ step.step_id }}</span> foi reenviado para execução. O fluxo continuará automaticamente.</p>
        </div>
        <div class="modal-action">
            <button onclick="document.getElementById('retry-result-modal').remove()" class="btn btn-sm">Fechar</button>
        </div>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('retry-result-modal').remove()"></div>
</dialog>
{% endif %}
