{% if error %}
<dialog id="execute-result-modal" class="modal modal-open">
    <div class="modal-box">
        <div class="flex items-center gap-2 mb-4">
            <span class="text-2xl">❌</span>
            <h3 class="font-bold text-lg">Não foi possível executar</h3>
        </div>
        <div class="alert alert-error">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
            </svg>
            <div>
                <p class="font-semibold">Release: <span class="font-mono">{{ name }}</span></p>
                <p class="text-sm mt-1">{{ error }}</p>
            </div>
        </div>
        <div class="modal-action">
            <button onclick="document.getElementById('execute-result-modal').remove()" class="btn btn-sm">Fechar</button>
        </div>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('execute-result-modal').remove()"></div>
</dialog>
{% else %}
<dialog id="execute-result-modal" class="modal modal-open">
    <div class="modal-box">
        <div class="flex items-center gap-2 mb-4">
            <span class="text-2xl">✅</span>
            <h3 class="font-bold text-lg">Release iniciada com sucesso</h3>
        </div>
        <div class="alert alert-success">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            <div>
                <p class="font-semibold">Release: <span class="font-mono">{{ name }}</span></p>
                <p class="text-sm mt-1">Execução #{{ execution_id }} criada e em andamento.</p>
            </div>
        </div>
        <div class="modal-action">
            <a href="/ui/execution/{{ execution_id }}" class="btn btn-sm btn-primary">Ver execução</a>
            <button onclick="document.getElementById('execute-result-modal').remove()" class="btn btn-sm">Fechar</button>
        </div>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('execute-result-modal').remove()"></div>
</dialog>
{% endif %}
