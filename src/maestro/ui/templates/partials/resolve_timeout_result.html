{% if error %}
<dialog id="resolve-timeout-modal" class="modal modal-open">
    <div class="modal-box">
        <div class="flex items-center gap-2 mb-4">
            <svg class="w-8 h-8 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            <h3 class="font-bold text-lg">Erro ao resolver timeout</h3>
        </div>
        <div class="alert alert-error">
            <p class="text-sm">{{ error }}</p>
        </div>
        <div class="modal-action">
            <button onclick="document.getElementById('resolve-timeout-modal').remove()" class="btn btn-sm">Fechar</button>
        </div>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('resolve-timeout-modal').remove()"></div>
</dialog>
{% else %}
<dialog id="resolve-timeout-modal" class="modal modal-open">
    <div class="modal-box">
        <div class="flex items-center gap-2 mb-4">
            {% if action == "success" %}
            <svg class="w-8 h-8 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
            <h3 class="font-bold text-lg">Step marcado como sucesso</h3>
            {% else %}
            <svg class="w-8 h-8 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            <h3 class="font-bold text-lg">Step marcado como falha</h3>
            {% endif %}
        </div>
        <div class="alert {% if action == 'success' %}alert-success{% else %}alert-error{% endif %}">
            <p class="text-sm">O step <span class="font-mono font-bold">{{ step.step_id }}</span> foi resolvido manualmente. O fluxo continuará automaticamente.</p>
        </div>
        <div class="modal-action">
            <button onclick="document.getElementById('resolve-timeout-modal').remove()" class="btn btn-sm">Fechar</button>
        </div>
    </div>
    <div class="modal-backdrop" onclick="document.getElementById('resolve-timeout-modal').remove()"></div>
</dialog>
{% endif %}
