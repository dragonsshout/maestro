{% extends "base.html" %}
{% block title %}Releases Arquivadas — Maestro{% endblock %}

{% block content %}
<div class="max-w-4xl">

    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary flex items-center">
            <svg class="w-8 h-8 mr-2 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>
            Releases Arquivadas
        </h1>
    </div>

    <!-- Lista de releases arquivadas -->
    <div class="card bg-base-100/50 backdrop-blur-sm border border-base-300/50 shadow-lg shadow-base-300/10 rounded-2xl">
        <div class="card-body">
            <div class="flex items-center justify-between mb-4">
                <h2 class="card-title text-base flex items-center m-0">
                    <svg class="w-5 h-5 mr-1 text-base-content/70" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>
                    Releases arquivadas
                </h2>
                <div class="form-control">
                    <div class="relative">
                        <input type="text"
                               name="search"
                               placeholder="Buscar por nome..."
                               class="input input-sm input-bordered bg-base-200/50 pl-8"
                               hx-get="/ui/partials/releases-archived"
                               hx-trigger="keyup changed delay:300ms, search"
                               hx-target="#releases-archived-table-container">
                        <svg class="w-4 h-4 absolute left-2.5 top-2.5 text-base-content/40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                </div>
            </div>

            <div hx-get="/ui/partials/releases-archived" hx-trigger="load" hx-swap="outerHTML">
                <div class="flex justify-center py-12">
                    <span class="loading loading-spinner loading-lg text-primary"></span>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
