<!DOCTYPE html>
<html lang="pt-BR" data-theme="night">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Maestro{% endblock %}</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind + DaisyUI via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind config for Inter font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    },
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- HTMX SSE extension -->
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <!-- HTMX JSON Encoding extension -->
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>

    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>

    <style>
        /* Fix para alinhamento perfeito de icones e textos de status sem quebrar linha */
        span[class^="status-"], span[class^="badge-modern-"] {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            white-space: nowrap;
        }
        span[class^="status-"] svg, span[class^="badge-modern-"] svg {
            flex-shrink: 0;
        }

        /* Cores base para os badges modernos caso o apply falhe */
        .badge-modern-success { color: oklch(var(--su)); }
        .badge-modern-error { color: oklch(var(--er)); }
        .badge-modern-warning { color: oklch(var(--wa)); }
        .badge-modern-info { color: oklch(var(--in)); }
        .badge-modern-ghost { color: oklch(var(--bc) / 0.7); }
        .badge-modern-neutral { color: oklch(var(--n)); }

        .status-pending          { color: oklch(var(--bc) / 0.7); }
        .status-in_progress      { color: oklch(var(--in)); }
        .status-success          { color: oklch(var(--su)); }
        .status-failure          { color: oklch(var(--er)); }
        .status-error            { color: oklch(var(--er)); }
        .status-aborted          { color: oklch(var(--n)); }
        .status-waiting_approval { color: oklch(var(--wa)); }

        /* Override Highlight.js background inside mockup-code */
        .mockup-code pre code.hljs {
            background: transparent;
            padding: 0;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            @apply bg-base-300 rounded-full;
        }
        ::-webkit-scrollbar-thumb:hover {
            @apply bg-base-content/30;
        }

        /* HTMX indicator: hidden by default, shown during request */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-flex;
        }

        /* ─── Flow Graph ─────────────────────────────────────────────────────── */
        .flow-graph {
            padding: 1.25rem 0;
        }
        .flow-graph-inner {
            display: flex;
            align-items: flex-start;
            gap: 0;
            min-width: max-content;
        }

        /* Stage card */
        .flow-stage-card {
            width: 11rem;
            min-height: 6rem;
            border-radius: 0.875rem;
            border: 1.5px solid;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            transition: box-shadow 0.2s ease, transform 0.15s ease;
            cursor: default;
            position: relative;
            background: oklch(var(--b1) / 0.6);
            backdrop-filter: blur(8px);
        }
        .flow-stage-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px oklch(var(--bc) / 0.12);
        }

        /* Stage card color variants */
        .flow-stage-card.flow-status-success {
            border-color: oklch(var(--su) / 0.6);
            box-shadow: 0 0 0 1px oklch(var(--su) / 0.15), 0 2px 12px oklch(var(--su) / 0.08);
        }
        .flow-stage-card.flow-status-failure {
            border-color: oklch(var(--er) / 0.6);
            box-shadow: 0 0 0 1px oklch(var(--er) / 0.15), 0 2px 12px oklch(var(--er) / 0.08);
        }
        .flow-stage-card.flow-status-in_progress {
            border-color: oklch(var(--wa) / 0.7);
            box-shadow: 0 0 0 1px oklch(var(--wa) / 0.2), 0 2px 12px oklch(var(--wa) / 0.1);
        }
        .flow-stage-card.flow-status-timeout {
            border-color: oklch(var(--wa) / 0.6);
            box-shadow: 0 0 0 1px oklch(var(--wa) / 0.15), 0 2px 12px oklch(var(--wa) / 0.08);
        }
        .flow-stage-card.flow-status-waiting_approval {
            border-color: oklch(var(--in) / 0.6);
            box-shadow: 0 0 0 1px oklch(var(--in) / 0.15), 0 2px 12px oklch(var(--in) / 0.08);
        }
        .flow-stage-card.flow-status-pending {
            border-color: oklch(var(--bc) / 0.2);
        }

        /* Stage header */
        .flow-stage-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.35rem;
            gap: 0.35rem;
        }
        .flow-stage-name {
            font-size: 0.7rem;
            font-weight: 700;
            font-family: ui-monospace, monospace;
            letter-spacing: 0.02em;
            color: oklch(var(--bc) / 0.9);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .flow-stage-dot {
            width: 0.55rem;
            height: 0.55rem;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .flow-stage-dot.dot-success      { background: oklch(var(--su)); }
        .flow-stage-dot.dot-failure      { background: oklch(var(--er)); }
        .flow-stage-dot.dot-in_progress  { background: oklch(var(--wa)); animation: flow-pulse 1.2s ease-in-out infinite; }
        .flow-stage-dot.dot-timeout      { background: oklch(var(--wa)); }
        .flow-stage-dot.dot-waiting_approval { background: oklch(var(--in)); }
        .flow-stage-dot.dot-pending      { background: oklch(var(--bc) / 0.3); }
        .flow-stage-dot.dot-aborted      { background: oklch(var(--n) / 0.6); }

        @keyframes flow-pulse {
            0%, 100% { opacity: 1;   transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.75); }
        }

        /* Divider inside card */
        .flow-card-divider {
            height: 1px;
            background: oklch(var(--bc) / 0.08);
            margin: 0.1rem 0 0.4rem;
        }

        /* Step item inside a flow card */
        .flow-step-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.3rem;
            border-radius: 0.4rem;
            cursor: pointer;
            transition: background 0.15s ease;
            text-decoration: none;
        }
        .flow-step-item:hover {
            background: oklch(var(--bc) / 0.07);
        }
        .flow-step-icon {
            width: 0.9rem;
            height: 0.9rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flow-step-icon svg {
            width: 100%;
            height: 100%;
        }
        .flow-step-label {
            font-size: 0.65rem;
            font-family: ui-monospace, monospace;
            color: oklch(var(--bc) / 0.75);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .flow-step-icon.icon-success      { color: oklch(var(--su)); }
        .flow-step-icon.icon-failure      { color: oklch(var(--er)); }
        .flow-step-icon.icon-in_progress  { color: oklch(var(--wa)); }
        .flow-step-icon.icon-timeout      { color: oklch(var(--wa)); }
        .flow-step-icon.icon-waiting_approval { color: oklch(var(--in)); }
        .flow-step-icon.icon-pending      { color: oklch(var(--bc) / 0.3); }
        .flow-step-icon.icon-aborted      { color: oklch(var(--n) / 0.5); }

        /* Arrow between stages */
        .flow-arrow {
            display: flex;
            align-items: center;
            padding: 0 0.3rem;
            margin-top: 2.5rem; /* vertically centres arrow relative to card top area */
            color: oklch(var(--bc) / 0.25);
            flex-shrink: 0;
        }
        .flow-arrow svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        /* Highlight on a table row when navigated from the graph */
        tr.flow-highlight {
            animation: row-highlight 1.8s ease forwards;
        }
        @keyframes row-highlight {
            0%   { background: oklch(var(--p) / 0.18); }
            100% { background: transparent; }
        }
        /* ─── end Flow Graph ─────────────────────────────────────────────────── */

        /* Disable buttons and links during HTMX requests to prevent double-clicks */
        button.htmx-request, a.htmx-request {
            pointer-events: none !important;
            opacity: 0.7;
        }

        /* Sidebar transition */
        #sidebar {
            transition: width 0.25s ease;
            overflow: hidden;
            width: 14rem; /* 56 = w-56 */
        }
        #sidebar.collapsed {
            width: 3.5rem; /* só ícones */
        }

        /* Esconde labels quando recolhido */
        #sidebar.collapsed .nav-label {
            display: none;
        }

        /* Centraliza ícone quando recolhido */
        #sidebar.collapsed .nav-item {
            justify-content: center;
            padding-left: 0;
            padding-right: 0;
        }

        /* Main content acompanha a sidebar */
        #main-content {
            transition: margin-left 0.25s ease;
            margin-left: 14rem;
        }
        #main-content.collapsed {
            margin-left: 3.5rem;
        }

        /* Tooltip quando recolhido */
        #sidebar.collapsed .nav-item {
            position: relative;
        }
    </style>
</head>
<body class="min-h-screen bg-base-200 font-sans text-base-content selection:bg-primary/30">

    <!-- Navbar -->
    <div class="navbar bg-base-100/80 backdrop-blur-md shadow-sm border-b border-base-300/50 fixed top-0 left-0 right-0 z-50 px-4 transition-all duration-300">
        <!-- Toggle button -->
        <button id="sidebar-toggle" class="btn btn-ghost btn-sm btn-square mr-2 hover:bg-base-200/50 transition-colors" title="Recolher menu">
            <svg id="icon-collapse" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <div class="flex-1">
            <a href="/ui" class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">🎼 Maestro</a>
        </div>
    </div>

    <!-- Layout: sidebar + content -->
    <div class="flex pt-16 min-h-screen">

        <!-- Sidebar -->
        <aside id="sidebar" class="bg-base-100/80 backdrop-blur-md border-r border-base-300/50 fixed top-16 left-0 bottom-0 flex flex-col py-4 z-40 transition-all duration-300">
            <ul class="menu px-2 gap-1 w-full">
                <li>
                    <a href="/ui"
                       class="nav-item flex items-center gap-3 transition-colors duration-200 hover:bg-base-200/70 {% if request.url.path in ['/ui', '/ui/'] %}active shadow-sm{% endif %}"
                       title="Execuções">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                        </svg>
                        <span class="nav-label">Execuções</span>
                    </a>
                </li>
                <li>
                    <a href="/ui/releases"
                       class="nav-item flex items-center gap-3 transition-colors duration-200 hover:bg-base-200/70 {% if request.url.path == '/ui/releases' %}active shadow-sm{% endif %}"
                       title="Releases">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" />
                        </svg>
                        <span class="nav-label">Releases</span>
                    </a>
                </li>
                <li>
                    <a href="/ui/releases/archived"
                       class="nav-item flex items-center gap-3 transition-colors duration-200 hover:bg-base-200/70 {% if request.url.path == '/ui/releases/archived' %}active shadow-sm{% endif %}"
                       title="Arquivadas">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                        </svg>
                        <span class="nav-label">Arquivadas</span>
                    </a>
                </li>
                <li>
                    <a href="/ui/schedules"
                       class="nav-item flex items-center gap-3 transition-colors duration-200 hover:bg-base-200/70 {% if request.url.path == '/ui/schedules' %}active shadow-sm{% endif %}"
                       title="Agendamentos">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span class="nav-label">Agendamentos</span>
                    </a>
                </li>
                <li>
                    <a href="/ui/job-registry"
                       class="nav-item flex items-center gap-3 transition-colors duration-200 hover:bg-base-200/70 {% if request.url.path == '/ui/job-registry' %}active shadow-sm{% endif %}"
                       title="Job Registry">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                        <span class="nav-label">Job Registry</span>
                    </a>
                </li>
                <li>
                    <a href="/ui/settings"
                       class="nav-item flex items-center gap-3 transition-colors duration-200 hover:bg-base-200/70 {% if request.url.path == '/ui/settings' %}active shadow-sm{% endif %}"
                       title="Configurações">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span class="nav-label">Configurações</span>
                    </a>
                </li>
            </ul>        </aside>

        <!-- Main content -->
        <main id="main-content" class="flex-1 px-6 py-8">
            {% block content %}{% endblock %}
        </main>

    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const toggleBtn = document.getElementById('sidebar-toggle');

        // Persiste estado no localStorage
        const STORAGE_KEY = 'maestro_sidebar_collapsed';
        const isCollapsed = localStorage.getItem(STORAGE_KEY) === 'true';

        if (isCollapsed) {
            sidebar.classList.add('collapsed');
            mainContent.classList.add('collapsed');
        }

        toggleBtn.addEventListener('click', () => {
            const collapsed = sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('collapsed', collapsed);
            localStorage.setItem(STORAGE_KEY, collapsed);
        });

        // Setup Highlight.js to run on htmx:load (which fires for initial load and subsequent HTMX swaps)
        document.body.addEventListener('htmx:load', function(evt) {
            if (typeof hljs !== 'undefined') {
                evt.detail.elt.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        });
    </script>

</body>
</html>
