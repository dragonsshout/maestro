{% extends "base.html" %}

{% block title %}Maestro - Usuarios{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Gestao de Usuarios</h1>
    <button class="btn btn-primary btn-sm" onclick="document.getElementById('create_user_modal').showModal()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Novo Usuario
    </button>
</div>

<!-- Users table (loaded via HTMX) -->
<div id="users-list"
     hx-get="/ui/users/partials/list"
     hx-trigger="load"
     hx-swap="innerHTML">
    <div class="flex justify-center py-8">
        <span class="loading loading-spinner loading-lg"></span>
    </div>
</div>

<!-- Create User Modal -->
<dialog id="create_user_modal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">Criar Novo Usuario</h3>
        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">X</button>
        </form>
        <form hx-post="/ui/users"
              hx-target="#users-list"
              hx-swap="innerHTML"
              hx-on::after-request="if(event.detail.successful) document.getElementById('create_user_modal').close()">
            <div class="form-control mb-3">
                <label class="label"><span class="label-text">Usuario</span></label>
                <input type="text" name="username" class="input input-bordered w-full" required />
            </div>
            <div class="form-control mb-3">
                <label class="label"><span class="label-text">Senha</span></label>
                <input type="password" name="password" class="input input-bordered w-full" required />
            </div>
            <div class="form-control mb-3">
                <label class="label"><span class="label-text">Nome Completo</span></label>
                <input type="text" name="full_name" class="input input-bordered w-full" />
            </div>
            <div class="form-control mb-4">
                <label class="label"><span class="label-text">Grupos</span></label>
                <div class="flex flex-wrap gap-2">
                    {% for group in groups %}
                    <label class="label cursor-pointer gap-2">
                        <input type="checkbox" name="group_ids" value="{{ group.id }}" class="checkbox checkbox-sm checkbox-primary" />
                        <span class="label-text">{{ group.name }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div class="modal-action">
                <button type="submit" class="btn btn-primary">Criar</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
{% endblock %}
