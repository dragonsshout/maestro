version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: maestro-db
    restart: always
    environment:
      POSTGRES_USER: maestro_user
      POSTGRES_PASSWORD: maestro_password
      POSTGRES_DB: maestro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
