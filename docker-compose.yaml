version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: maestro-db
    restart: always
    environment:
      POSTGRES_USER: maestro_user
      POSTGRES_PASSWORD: maestro_password
      POSTGRES_DB: maestro_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jenkins:
    image: jenkins/jenkins:lts
    container_name: maestro-jenkins
    restart: always
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home

volumes:
  postgres_data:
  jenkins_data:
